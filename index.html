<!DOCTYPE html>
<html>

<body>

<div id="login">
    <h2>Enter Password</h2>

    <input type="password" id="pwd">

    <button onclick="check()">
        Enter
    </button>
</div>


<div id="site" style="display:none;">

<h1>Welcome Boy!!!</h1>

<div id="chat"
style="
border:1px solid black;
height:300px;
overflow-y:auto;
padding:10px;
margin-bottom:15px;
">

</div>


<textarea
id="msg"

placeholder="Type your message here..."

style="
width:95%;
height:150px;
font-size:16px;
padding:10px;
">
</textarea>

<br><br>

<button onclick="send()">
Send
</button>

</div>


<script>

function check(){

if(document.getElementById("pwd").value==="2010"){

document.getElementById("login").style.display="none";

document.getElementById("site").style.display="block";

loadChat();

}
else{

alert("Wrong password");

}

}



function send(){

let text=
document.getElementById("msg").value.trim();

if(text==="") return;


let chats=
JSON.parse(
localStorage.getItem("chat")
) || [];


chats.push(text);


localStorage.setItem(
"chat",
JSON.stringify(chats)
);


document.getElementById("msg").value="";


loadChat();

}



function loadChat(){

let chats=
JSON.parse(
localStorage.getItem("chat")
) || [];


let box=
document.getElementById("chat");


box.innerHTML="";


chats.forEach(function(message){

box.innerHTML +=
`
<div style="
margin-bottom:10px;
padding:10px;
background:#f2f2f2;
border-radius:10px;
">

${message.replace(/\n/g,"<br>")}

</div>
`;

});


box.scrollTop=
box.scrollHeight;

}

</script>

</body>

</html>
